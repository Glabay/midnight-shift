<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
    <div class="photo-item" th:fragment="photos(photos)" th:each="photo : ${photos}">
        <div class="card">
            <div class="card-body">
                <p class="card-text" th:text="${photo.getTitle()}">Photo title</p>
            </div>
            <img class="card-img-top"
                 th:src="${photo.getUrl()}"
                 style="object-fit: cover;"
                 alt="photo">
        </div>
    </div>
</body>
</html>
