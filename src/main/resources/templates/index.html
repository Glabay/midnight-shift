<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8"
            crossorigin="anonymous">
    </script>
    <title>Midnight-Shift</title>
</head>
<body>
    <header th:replace="~{fragments/header :: header}"></header>

    <main class="feed-container">
        <div class="post-card" th:each="post : ${posts}">
            <div class="post-header">
                <h5 th:text="${post.getTitle()}">Title</h5>

                <span class="author"
                    th:id="'author-' + ${post.getId()}"
                    th:attr="hx-get=@{/api/v1/users/{id}/username(id=${post.getUserId()})}"
                    hx-trigger="load"
                    hx-target="this"
                    hx-swap="innerHTML">
                </span>
            </div>
            <div class="post-body">
                <p th:text="${post.getBody()}">content</p>
            </div>

            <div class="comments-section">
                <h5>Comments</h5>
                <div th:attr="hx-get=@{/api/v1/comments/posts/{id}(id=${post.getId()})}"
                     hx-trigger="load"
                     hx-target="this"
                     hx-swap="innerHTML">
                </div>
            </div>
            <!-- TODO: Add a load more button -->
        </div>
    </main>
</body>
</html>
